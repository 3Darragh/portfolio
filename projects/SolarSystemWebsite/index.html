<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="CSS/page.css">
    <link rel="stylesheet" href="CSS/objects.css">
    <link rel="stylesheet" href="CSS/spritesheets.css">

</html>
